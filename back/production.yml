volumes:
  production_postgres_data: {}
  production_postgres_data_backups: {}
  production_django_media: {}
  production_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
    image: autochecker_production_django
    volumes:
      - production_django_media:/app/autochecker/media
    depends_on:
      - postgres
      - redis
    ports:
      - '${DJANGO_PORT:-8000}:8000'
    env_file:
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: autochecker_production_postgres
    volumes:
      - production_postgres_data:/var/lib/postgresql/data
      - production_postgres_data_backups:/backups
    env_file:
      - ./.envs/.production/.postgres

  redis:
    image: docker.io/redis:6
    volumes:
      - production_redis_data:/data

  celeryworker:
    <<: *django
    image: autochecker_production_celeryworker
    container_name: autochecker_production_celeryworker
    depends_on:
      - redis
      - postgres
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: autochecker_production_celerybeat
    container_name: autochecker_production_celerybeat
    depends_on:
      - redis
      - postgres
    ports: []
    command: /start-celerybeat
